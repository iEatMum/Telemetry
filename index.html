<!doctype html>
<html lang="en" data-theme="split_book">
  <head>
    <meta charset="UTF-8" />
    <!-- No maximum-scale / user-scalable=no: low-vision users must be able to
         pinch-zoom in the WKWebView (WCAG 1.4.4). The type scale is fixed px, so
         zoom is the primary path to enlarge text until Dynamic Type is wired. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ede4ce" />
    <!-- iOS: let it run like a real app from the home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Telemetry" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/icons/favicon-32.png" sizes="32x32" />
    <title>Telemetry</title>
    <script>
      // Apply the persisted theme before first paint so there's no flash of the
      // default skin. ThemeProvider (src/lib/theme.jsx) takes over once React mounts.
      try {
        var s = JSON.parse(localStorage.getItem('lockedin:settings') || '{}')
        // Legacy (pre-Split-Ledger) keys map to their descendants here too, so
        // a migrated install never flashes the default skin before React boots.
        var legacy = { zen: 'split_book', night_ops: 'lamplight', terminal: 'carbon' }
        var t = Object.prototype.hasOwnProperty.call(legacy, s.theme) ? legacy[s.theme] : s.theme
        if (['split_book', 'lamplight', 'carbon'].indexOf(t) !== -1) {
          document.documentElement.dataset.theme = t
          document.documentElement.style.colorScheme = t === 'split_book' ? 'light' : 'dark'
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
