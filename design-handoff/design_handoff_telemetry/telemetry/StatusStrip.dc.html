<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="telemetry.css">
</helmet>
<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;height:22px;padding:0 2px;font-family:var(--font-clock)">
  <dc-import name="StatusLED" status="{{ status }}" label="{{ status }}" hint-size="76px,16px"></dc-import>
  <span style="display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:.1em;color:var(--muted)">
    <svg width="14" height="10" viewBox="0 0 14 10" style="display:block"><rect x="0" y="6" width="3" height="4" fill="var(--muted)"></rect><rect x="5" y="3" width="3" height="7" fill="var(--muted)"></rect><rect x="10" y="0" width="3" height="10" fill="var(--accent)"></rect></svg>
    <span style="font-variant-numeric:tabular-nums">{{ clock }}</span>
  </span>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:320,&quot;height&quot;:24},&quot;status&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;LIVE&quot;,&quot;LOCAL&quot;,&quot;OFFLINE&quot;],&quot;default&quot;:&quot;LOCAL&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;clock&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;06:14&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    return { status: p.status || "LIVE", clock: p.clock || "06:14" };
  }
}
</script>
</body>
</html>
