<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="telemetry.css">
</helmet>
<svg width="{{ w }}" height="{{ h }}" viewBox="0 0 {{ w }} {{ h }}" fill="none" style="display:block;overflow:visible;filter:drop-shadow(0 0 2px {{ glow }})">
  <path d="{{ d }}" stroke="{{ stroke }}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path>
  <circle cx="{{ lastX }}" cy="{{ lastY }}" r="1.9" fill="{{ stroke }}"></circle>
</svg>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:110,&quot;height&quot;:34},&quot;data&quot;:{&quot;editor&quot;:null,&quot;default&quot;:[4,6,5,7,6,8,7,9,8,11,10,12],&quot;tsType&quot;:&quot;number[]&quot;},&quot;tone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;accent&quot;,&quot;pos&quot;,&quot;neg&quot;,&quot;warn&quot;,&quot;muted&quot;],&quot;default&quot;:&quot;accent&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;width&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:96,&quot;tsType&quot;:&quot;number&quot;},&quot;height&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:26,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const data = (Array.isArray(p.data) && p.data.length)
      ? p.data
      : [4, 6, 5, 7, 6, 8, 7, 9, 8, 11, 10, 12];
    const w = p.width ?? 96;
    const h = p.height ?? 26;
    const pad = 2;
    const mn = Math.min(...data), mx = Math.max(...data), rng = (mx - mn) || 1;
    const n = data.length, iw = w - pad * 2, ih = h - pad * 2;
    const pts = data.map((v, i) => [
      pad + (n === 1 ? iw / 2 : (iw * i) / (n - 1)),
      pad + ih - ((v - mn) / rng) * ih,
    ]);
    const d = pts.map((pt, i) => (i ? "L" : "M") + pt[0].toFixed(1) + " " + pt[1].toFixed(1)).join(" ");
    const toneC = { accent: "var(--accent)", pos: "var(--pos)", neg: "var(--neg)", warn: "var(--warn)", muted: "var(--muted)" };
    const toneG = { accent: "var(--accent-glow)", pos: "var(--accent-glow)", neg: "rgba(255,73,95,.4)", warn: "rgba(255,178,36,.4)", muted: "transparent" };
    const stroke = toneC[p.tone] || "var(--accent)";
    const glow = toneG[p.tone] || "var(--accent-glow)";
    const last = pts[pts.length - 1];
    return { w, h, d, stroke, glow, lastX: last[0].toFixed(1), lastY: last[1].toFixed(1) };
  }
}
</script>
</body>
</html>
