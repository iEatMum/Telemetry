<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="telemetry.css">
</helmet>
<div style="background:var(--surface);border:1px solid var(--line);border-radius:var(--r-6);padding:14px;font-family:var(--font-sans)">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px">
    <span style="display:flex;align-items:center;gap:8px;min-width:0">
      <span style="font-family:var(--font-clock);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);white-space:nowrap">{{ label }}</span>
      <sc-if value="{{ highImpact }}"><span style="flex:none;display:inline-flex;align-items:center;gap:3px;font-family:var(--font-clock);font-size:9px;letter-spacing:.1em;color:var(--accent);border:1px solid var(--accent-deep);border-radius:var(--r-3);padding:2px 5px">&#9670; HIGH IMPACT</span></sc-if>
    </span>
    <span style="font-family:var(--font-clock);font-size:11px;letter-spacing:.06em;color:var(--muted);white-space:nowrap">@ {{ at }}</span>
  </div>
  <div style="display:flex;align-items:flex-end;gap:11px;margin:2px 0 12px">
    <span class="{{ breatheClass }}" style="font-family:var(--font-clock);font-variant-numeric:tabular-nums;font-size:46px;line-height:.86;font-weight:500;color:var(--accent);text-shadow:0 0 16px var(--accent-glow)">{{ mm }}<span style="opacity:.5">:</span>{{ ss }}</span>
    <span style="font-family:var(--font-clock);font-size:10px;letter-spacing:.14em;color:var(--muted);padding-bottom:6px">MIN&#160;&#160;SEC</span>
  </div>
  <div style="height:4px;background:var(--surface-2);border-radius:var(--r-3);overflow:hidden;margin-bottom:12px">
    <div style="height:100%;width:{{ pct }};background:var(--accent);box-shadow:0 0 8px var(--accent-glow);transition:width 1s linear"></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <button onClick="{{ toggle }}" style="flex:1;font-family:var(--font-clock);font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;color:var(--accent-ink);background:var(--accent);border:none;border-radius:var(--r-5);padding:11px;cursor:pointer;box-shadow:0 0 14px var(--accent-glow)">{{ btnLabel }}</button>
    <button onClick="{{ reset }}" style="flex:none;font-family:var(--font-clock);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-5);padding:11px 15px;cursor:pointer">Reset</button>
  </div>
  <sc-if value="{{ hasNote }}"><div style="margin-top:11px;font-size:12px;color:var(--muted);line-height:1.42">{{ note }}</div></sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:250},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Deep Work&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;minutes&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:90,&quot;min&quot;:5,&quot;max&quot;:180,&quot;unit&quot;:&quot;min&quot;,&quot;tsType&quot;:&quot;number&quot;},&quot;at&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;09:30&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;highImpact&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;note&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Phone in the box. One block, one target: finish the methods section.&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { running: false, remaining: null };
  get total() { return (this.props.minutes ?? 90) * 60; }
  componentWillUnmount() { clearInterval(this._t); }
  toggle() {
    if (this.state.running) { clearInterval(this._t); this.setState({ running: false }); return; }
    let rem = this.state.remaining == null ? this.total : this.state.remaining;
    if (rem <= 0) rem = this.total;
    this.setState({ running: true, remaining: rem });
    this._t = setInterval(() => {
      this.setState(s => {
        const r = (s.remaining == null ? this.total : s.remaining) - 1;
        if (r <= 0) { clearInterval(this._t); return { remaining: 0, running: false }; }
        return { remaining: r };
      });
    }, 1000);
  }
  reset() { clearInterval(this._t); this.setState({ running: false, remaining: null }); }
  renderVals() {
    const p = this.props;
    const total = this.total;
    const rem = this.state.remaining == null ? total : this.state.remaining;
    const mm = String(Math.floor(rem / 60)).padStart(2, "0");
    const ss = String(rem % 60).padStart(2, "0");
    const pct = total ? (1 - rem / total) * 100 : 0;
    const started = this.state.remaining != null && this.state.remaining < total;
    return {
      label: p.label || "Deep Work",
      at: p.at || "09:30",
      note: p.note || "Phone in the box. One block, one target: finish the methods section.",
      hasNote: p.note !== "",
      highImpact: p.highImpact !== undefined ? !!p.highImpact : true,
      mm, ss,
      breatheClass: this.state.running ? "tl-breathe" : "",
      pct: pct.toFixed(1) + "%",
      btnLabel: this.state.running ? "Pause" : started ? "Resume" : "Start",
      toggle: () => this.toggle(),
      reset: () => this.reset(),
    };
  }
}
</script>
</body>
</html>
