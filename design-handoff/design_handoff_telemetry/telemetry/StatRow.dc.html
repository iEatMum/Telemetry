<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="telemetry.css">
</helmet>
<div style="background:var(--surface);border:1px solid var(--line);border-radius:var(--r-6);padding:14px;font-family:var(--font-sans)">
  <sc-if value="{{ hasTitle }}" hint-placeholder-val="{{ true }}"><div style="font-family:var(--font-clock);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:12px">{{ title }}</div></sc-if>
  <div style="display:grid;grid-template-columns:{{ gridCols }};gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--r-5);overflow:hidden">
    <sc-for list="{{ items }}" as="it" hint-placeholder-count="3">
      <div style="background:var(--surface);padding:10px 12px;display:flex;flex-direction:column;gap:6px;min-width:0">
        <span style="font-family:var(--font-clock);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ it.label }}</span>
        <span style="font-family:var(--font-clock);font-variant-numeric:tabular-nums;font-size:19px;font-weight:500;line-height:1;color:{{ it.valColor }};text-shadow:{{ it.valGlow }}">{{ it.value }}</span>
        <sc-if value="{{ it.hasDelta }}"><span><dc-import name="DeltaTag" value="{{ it.delta }}" suffix="{{ it.deltaSuffix }}" hint-size="48px,15px"></dc-import></span></sc-if>
      </div>
    </sc-for>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:120},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;cols&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:3,&quot;min&quot;:1,&quot;max&quot;:4,&quot;tsType&quot;:&quot;number&quot;},&quot;items&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{ label: string; value: string; delta?: number; deltaSuffix?: string; accent?: boolean }[]&quot;}}">
const DEF = [
  { label: "Clean days", value: "41", delta: 1, accent: true },
  { label: "Miles / wk", value: "52", delta: 4 },
  { label: "Income / mo", value: "$6.2k", delta: 12, deltaSuffix: "%" },
];
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const cols = p.cols ?? (p.items ? Math.min(p.items.length, 3) : 3);
    const items = (p.items && p.items.length ? p.items : DEF).map(it => ({
      label: it.label, value: it.value,
      delta: it.delta, deltaSuffix: it.deltaSuffix ?? "", hasDelta: it.delta != null,
      valColor: it.accent ? "var(--accent)" : "var(--text)",
      valGlow: it.accent ? "0 0 12px var(--accent-glow)" : "var(--text-glow)",
    }));
    return {
      title: p.title || "", hasTitle: !!(p.title),
      gridCols: "repeat(" + cols + ",minmax(0,1fr))",
      items,
    };
  }
}
</script>
</body>
</html>
