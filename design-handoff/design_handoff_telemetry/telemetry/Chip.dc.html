<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="telemetry.css">
</helmet>
<sc-if value="{{ isOn }}" hint-placeholder-val="{{ true }}">
  <button onClick="{{ toggle }}" style="display:inline-flex;align-items:center;gap:6px;font-family:var(--font-clock);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:var(--pos-soft);border:1px solid var(--accent-deep);border-radius:999px;padding:7px 13px;cursor:pointer;line-height:1"><span style="width:5px;height:5px;border-radius:999px;background:var(--accent);box-shadow:0 0 6px var(--accent-glow)"></span>{{ label }}</button>
</sc-if>
<sc-if value="{{ isOff }}">
  <button onClick="{{ toggle }}" style="display:inline-flex;align-items:center;gap:6px;font-family:var(--font-clock);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:7px 13px;cursor:pointer;line-height:1">{{ label }}</button>
</sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:110,&quot;height&quot;:36},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Focus&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;active&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;onToggle&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(on: boolean) =&gt; void&quot;}}">
class Component extends DCLogic {
  state = { on: null };
  renderVals() {
    const on = this.state.on ?? (this.props.active ?? true);
    return {
      label: this.props.label || "Focus",
      isOn: on, isOff: !on,
      toggle: () => {
        const next = !on;
        this.setState({ on: next });
        if (this.props.onToggle) this.props.onToggle(next);
      },
    };
  }
}
</script>
</body>
</html>
