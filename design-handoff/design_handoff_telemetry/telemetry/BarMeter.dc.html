<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="telemetry.css">
</helmet>
<div style="width:100%;height:{{ h }}px;background:var(--surface-2);border-radius:var(--r-3);overflow:hidden">
  <div style="height:100%;width:{{ pct }};background:{{ fill }};border-radius:var(--r-3);box-shadow:0 0 8px {{ glow }};transition:width var(--dur-calm) var(--ease)"></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:220,&quot;height&quot;:20},&quot;value&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:42,&quot;tsType&quot;:&quot;number&quot;},&quot;max&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:60,&quot;tsType&quot;:&quot;number&quot;},&quot;tone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;accent&quot;,&quot;pos&quot;,&quot;warn&quot;,&quot;neg&quot;],&quot;default&quot;:&quot;accent&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;height&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:6,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const value = p.value ?? 42;
    const max = p.max ?? 60;
    const pct = Math.max(0, Math.min(100, max ? (value / max) * 100 : 0));
    const toneC = { accent: "var(--accent)", pos: "var(--pos)", warn: "var(--warn)", neg: "var(--neg)" };
    const toneG = { accent: "var(--accent-glow)", pos: "var(--accent-glow)", warn: "rgba(255,178,36,.4)", neg: "rgba(255,73,95,.4)" };
    const fill = toneC[p.tone] || "var(--accent)";
    const glow = toneG[p.tone] || "var(--accent-glow)";
    return { h: p.height ?? 6, pct: pct.toFixed(1) + "%", fill, glow };
  }
}
</script>
</body>
</html>
