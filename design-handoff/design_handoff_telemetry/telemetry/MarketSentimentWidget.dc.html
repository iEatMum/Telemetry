<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="telemetry.css">
</helmet>
<div style="background:var(--surface);border:1px solid var(--line);border-radius:var(--r-6);padding:14px;font-family:var(--font-sans)">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px">
    <span style="font-family:var(--font-clock);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)">{{ label }}</span>
    <dc-import name="StatusLED" status="{{ status }}" label="{{ status }}" hint-size="70px,16px"></dc-import>
  </div>
  <div style="margin-bottom:4px">
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:7px">
      <span style="font-family:var(--font-clock);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)">Sentiment</span>
      <span style="font-family:var(--font-clock);font-variant-numeric:tabular-nums;font-size:15px;font-weight:500;color:{{ zoneColor }}">{{ score }} <span style="font-size:11px;letter-spacing:.1em">{{ zoneLabel }}</span></span>
    </div>
    <div style="position:relative;height:8px;border-radius:999px;overflow:hidden;background:linear-gradient(90deg,var(--neg),var(--warn) 52%,var(--pos))">
      <div style="position:absolute;top:-3px;bottom:-3px;left:{{ scorePct }};width:2px;background:var(--text);box-shadow:0 0 6px var(--scrim);transform:translateX(-1px)"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-family:var(--font-clock);font-size:9px;letter-spacing:.1em;color:var(--muted);margin-top:5px">
      <span>BEARISH</span><span>BULLISH</span>
    </div>
  </div>
  <div style="margin-top:10px">
    <sc-for list="{{ tickers }}" as="t" hint-placeholder-count="6">
      <div style="display:flex;align-items:center;gap:10px;padding:8px;border-top:1px solid var(--line);background:{{ t.rowBg }}">
        <span style="flex:none;display:inline-flex;align-items:center;gap:5px;width:78px">
          <sc-if value="{{ t.focus }}"><span style="color:var(--accent);font-size:8px;text-shadow:var(--num-glow)">&#9670;</span></sc-if>
          <span style="font-family:var(--font-clock);font-size:12px;letter-spacing:.05em;color:{{ t.symColor }}">{{ t.symbol }}</span>
        </span>
        <span style="flex:1;text-align:right;font-family:var(--font-clock);font-variant-numeric:tabular-nums;font-size:12px;color:var(--muted)">{{ t.last }}</span>
        <span style="flex:none;width:60px;display:flex;justify-content:flex-end"><dc-import name="DeltaTag" value="{{ t.change }}" suffix="%" hint-size="48px,15px"></dc-import></span>
      </div>
    </sc-for>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:330},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Internal Markets&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;status&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;LIVE&quot;,&quot;LOCAL&quot;,&quot;OFFLINE&quot;],&quot;default&quot;:&quot;LIVE&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;sentiment&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{ score: number }&quot;},&quot;tickers&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{ symbol: string; last: string; changePct: number; focus?: boolean }[]&quot;}}">
const DEF_TICKERS = [
  { symbol: "FOCUS", last: "3.2h", changePct: 6, focus: true },
  { symbol: "SLEEP", last: "7.4h", changePct: 9 },
  { symbol: "TRAIN", last: "52mi", changePct: 4 },
  { symbol: "READ", last: "38p", changePct: 11 },
  { symbol: "MOOD", last: "68", changePct: -4 },
  { symbol: "SCREEN", last: "2.1h", changePct: -12 },
];
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const score = (p.sentiment && p.sentiment.score != null) ? p.sentiment.score : 72;
    const zone = score >= 60 ? { label: "BULLISH", color: "var(--pos)" }
      : score <= 40 ? { label: "BEARISH", color: "var(--neg)" }
      : { label: "NEUTRAL", color: "var(--warn)" };
    const tickers = (p.tickers && p.tickers.length ? p.tickers : DEF_TICKERS).map(t => ({
      symbol: t.symbol, last: t.last, change: t.changePct, focus: !!t.focus,
      rowBg: t.focus ? "var(--surface-2)" : "transparent",
      symColor: t.focus ? "var(--accent)" : "var(--text)",
    }));
    return {
      label: p.label || "Internal Markets", status: p.status || "LIVE",
      score: String(score), scorePct: score + "%",
      zoneLabel: zone.label, zoneColor: zone.color, tickers,
    };
  }
}
</script>
</body>
</html>
