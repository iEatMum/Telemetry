<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="telemetry.css">
</helmet>
<div style="border:1px dashed var(--line);border-radius:var(--r-6);padding:26px 16px;background:var(--surface);text-align:center;display:flex;flex-direction:column;align-items:center;gap:11px;font-family:var(--font-sans)">
  <span style="display:inline-flex;align-items:center;gap:7px">
    <span style="width:7px;height:7px;border-radius:999px;background:var(--muted);opacity:.55"></span>
    <span style="font-family:var(--font-clock);font-size:12px;letter-spacing:.22em;color:var(--muted)">{{ label }}</span>
  </span>
  <svg width="132" height="22" viewBox="0 0 132 22" style="opacity:.4;display:block"><path d="M0 15 L22 12 L44 16 L66 9 L88 14 L110 8 L132 13" fill="none" stroke="var(--line)" stroke-width="1.4" stroke-dasharray="3 3"></path></svg>
  <span style="font-size:12px;color:var(--muted);line-height:1.45;max-width:270px">{{ hint }}</span>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:150},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;NO SIGNAL&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;hint&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Awaiting first sync. Trends populate after your first full day is refactored.&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    return {
      label: p.label || "NO SIGNAL",
      hint: p.hint || "Awaiting first sync. Trends populate after your first full day is refactored.",
    };
  }
}
</script>
</body>
</html>
