<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="telemetry.css">
</helmet>
<button onClick="{{ onPress }}" style="display:inline-flex;align-items:center;gap:7px;font-family:var(--font-clock);font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--accent-ink);background:var(--accent);border:none;border-radius:999px;padding:11px 17px;cursor:pointer;box-shadow:0 0 18px var(--accent-glow),0 6px 16px rgba(0,0,0,.45)">
  <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
  Help now
</button>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:150,&quot;height&quot;:48},&quot;onPress&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return { onPress: this.props.onPress || (() => {}) };
  }
}
</script>
</body>
</html>
