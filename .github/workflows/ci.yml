name: CI

# Validate the pure logic layer (Vitest) before spending time on browser E2E
# (Playwright). If Stakes/Readiness logic is broken, fail fast — no need to boot
# Vite and Chromium.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 1) Fast unit tests — the gate. Must pass before E2E runs.
      - name: Unit tests (Vitest)
        run: npm test

      # 2) Heavy browser E2E — only reached when unit tests are green.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
